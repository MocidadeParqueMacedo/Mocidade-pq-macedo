<meta name="apple-mobile-web-app-title" content="RJ Macedo"/>

    });

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
  if (typeof ChartDataLabels !== 'undefined') { Chart.register(ChartDataLabels); }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #3730a3;
    --accent: #f59e0b;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --success: #22c55e;
    --danger: #ef4444;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ══ TEMA ESCURO ══ */
  body.tema-escuro {
    --primary: #818cf8;
    --primary-light: #a5b4fc;
    --primary-dark: #6366f1;
    --accent: #f59e0b;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #22c55e;
    --danger: #ef4444;
  }
  body.tema-escuro input,
  body.tema-escuro select,
  body.tema-escuro textarea {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border);
    color-scheme: dark;
  }
  body.tema-escuro input::placeholder,
  body.tema-escuro textarea::placeholder {
    color: var(--text-muted);
    opacity: 1;
  }
  body.tema-escuro select option {
    background: #1e293b;
    color: #f1f5f9;
  }
  body.tema-escuro input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
  }
  /* Dia selecionado no calendário — fundo roxo, texto branco legível */
  body.tema-escuro input[type="date"]::-webkit-datetime-edit-day-field:focus,
  body.tema-escuro input[type="date"]::-webkit-datetime-edit-month-field:focus,
  body.tema-escuro input[type="date"]::-webkit-datetime-edit-year-field:focus {
    background: var(--primary);
    color: #ffffff;
    border-radius: 4px;
  }
  /* Garante que o texto dos campos de data seja sempre visível */
  body.tema-escuro input[type="date"]::-webkit-datetime-edit {
    color: var(--text);
  }
  body.tema-escuro input[type="date"]::-webkit-datetime-edit-fields-wrapper {
    background: transparent;
  }
  body.tema-escuro input[type="time"]::-webkit-datetime-edit {
    color: var(--text);
  }

  .header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; padding: 20px 16px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(79,70,229,0.3); }
  .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
  .stat-value { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: .7rem; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; }

  .nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; padding: 0 8px; position: sticky; top: 70px; z-index: 90; }
  .nav-btn { flex: 0 0 auto; padding: 12px 16px; font-size: .82rem; font-weight: 600; color: var(--text-muted); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all .2s; }
  .nav-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .section { display: none; padding: 16px; }
  .section.active { display: block; }

  .card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
  .card-title { font-size: .9rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

  .form-group { margin-bottom: 12px; }
  label { font-size: .8rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: .9rem; background: var(--bg); color: var(--text); transition: border .2s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-light); background: var(--card); color: var(--text); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 10px; font-size: .87rem; font-weight: 700; border: none; cursor: pointer; transition: all .2s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--bg); color: var(--primary); border: 1.5px solid var(--primary-light); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: .78rem; border-radius: 8px; }
  .btn-full { width: 100%; }

  .member-item { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .member-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #fff; font-weight: 700; flex-shrink: 0; overflow: hidden; }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-weight: 700; font-size: .95rem; }
  .member-detail { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
  .member-badge { font-size: .68rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; display: inline-block; margin-top: 4px; background: #fef3c7; color: #d97706; }

  .presence-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .presence-item:last-child { border-bottom: none; }
  .presence-toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; border: none; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
  .presence-toggle.checked { background: var(--success); }

  .presence-toggle.checked::after { left: 23px; }

  .photo-upload { width: 100px; height: 100px; border-radius: 50%; border: 3px dashed var(--primary-light); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto 12px; font-size: .72rem; color: var(--text-muted); text-align: center; overflow: hidden; background: var(--bg); }
  .photo-upload img { width: 100%; height: 100%; object-fit: cover; }

  .birthday-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .birthday-item:last-child { border-bottom: none; }
  .birthday-days { font-size: .75rem; color: var(--accent); font-weight: 700; }

  .history-item { padding: 14px; background: var(--bg); border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; transition: all .2s; display: flex; align-items: center; justify-content: space-between; }
  .history-item:hover { border-color: var(--primary-light); background: #eef2ff; }
  .history-left { flex: 1; }
  .history-date { font-weight: 700; font-size: .87rem; }
  .history-count { font-size: .8rem; color: var(--text-muted); }
  .history-arrow { font-size: 1.1rem; color: var(--primary-light); }
  .history-tag { font-size: .68rem; background: #eef2ff; color: var(--primary); border-radius: 6px; padding: 2px 7px; font-weight: 700; display: inline-block; }
  .history-tag.proxima { background: #fef3c7; color: #d97706; }

  /* Delete button for history items */
  .history-del-btn { background: none; border: none; color: var(--danger); font-size: 1rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; opacity: 0.6; }
  .history-del-btn:hover { opacity: 1; background: #fee2e2; }

  .members-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .menu-card { background: var(--card); border-radius: var(--radius); padding: 18px 10px; text-align: center; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; transition: all .2s; }
  .menu-card:hover, .menu-card.active { border-color: var(--primary); background: #eef2ff; }
  .menu-card .menu-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .menu-card .menu-label { font-size: .82rem; font-weight: 700; color: var(--text); }
  .menu-card.full-width { grid-column: 1 / -1; }

  .submenu { display: none; }
  .submenu.active { display: block; }
  .submenu-title { font-size: .85rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .submenu-title .back-btn { font-size: .75rem; background: var(--bg); border: none; color: var(--primary); padding: 4px 10px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .submenu-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .submenu-opt { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; font-size: .8rem; font-weight: 600; transition: all .2s; }
  .submenu-opt:hover { border-color: var(--primary); background: #eef2ff; color: var(--primary); }

  .search-bar { position: relative; margin-bottom: 14px; }
  .search-bar input { padding-left: 36px; }
  .search-bar .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 1rem; color: var(--text-muted); pointer-events: none; }

  .freq-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .freq-table th { background: var(--primary); color: #fff; padding: 8px; text-align: left; }
  .freq-table td { padding: 8px; border-bottom: 1px solid var(--border); }
  .freq-bar { height: 6px; background: var(--primary-light); border-radius: 3px; }

  .empty { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: .87rem; }
  .empty .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 16px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; color: var(--primary); }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: .85rem; z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .fab-container { position: fixed; bottom: 24px; right: 20px; z-index: 150; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .fab-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: #fff; border: none; font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 16px rgba(79,70,229,0.4); display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .fab-btn:hover { background: var(--primary-dark); transform: scale(1.07); }
  .fab-options { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; opacity: 0; pointer-events: none; transform: translateY(10px); transition: all .25s; }
  .fab-options.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .fab-option { display: flex; align-items: center; gap: 10px; background: var(--card); border: none; border-radius: 24px; padding: 10px 16px; box-shadow: 0 3px 12px rgba(0,0,0,0.13); cursor: pointer; font-size: .85rem; font-weight: 700; color: var(--primary); white-space: nowrap; transition: all .15s; }
  .fab-option:hover { background: #eef2ff; }
  .fab-backdrop { display: none; position: fixed; inset: 0; z-index: 140; }
  .fab-backdrop.open { display: block; }

  .presenca-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .presenca-back { background: var(--bg); border: none; color: var(--primary); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: .82rem; }
  #historico-presenca { display: none; }

  /* ══ ANNUAL CALENDAR ══ */
  .annual-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .annual-cal-year-label { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
  .annual-cal-nav { display: flex; gap: 8px; }
  .annual-cal-nav-btn { background: var(--bg); border: 1.5px solid var(--border); color: var(--primary); border-radius: 10px; padding: 6px 14px; font-size: .9rem; font-weight: 700; cursor: pointer; transition: all .15s; }
  .annual-cal-nav-btn:hover { background: #eef2ff; }

  .annual-months-grid { display: flex; flex-direction: column; gap: 14px; }

  .month-mini { background: var(--card); border-radius: 14px; padding: 14px 12px; box-shadow: var(--shadow); }
  .month-mini-title { text-align: center; font-size: .95rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .6px; }
  .month-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .mm-dow { text-align: center; font-size: .7rem; font-weight: 700; color: var(--text-muted); padding: 4px 0; }
  .mm-dow:first-child { color: var(--danger); }
  .mm-dow:last-child { color: #3b82f6; }
  .mm-day {
    aspect-ratio: 1; border-radius: 7px; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; padding-top: 4px;
    cursor: pointer; position: relative; transition: background .1s;
    font-size: .82rem; font-weight: 600; color: var(--text);
    background: transparent;
  }
  .mm-day:hover { background: #eef2ff; color: var(--primary); }
  .mm-day:active { background: var(--primary); color: #fff; }
  .mm-day.empty { cursor: default; pointer-events: none; }
  .mm-day.today { background: var(--primary); color: #fff; border-radius: 7px; }
  .mm-day.selected { background: var(--primary-light); color: #fff; border-radius: 7px; }
  .mm-day.domingo:not(.today):not(.selected) { color: var(--danger); }
  .mm-day.sabado:not(.today):not(.selected) { color: #3b82f6; }
  /* Dark mode overrides */
  body.tema-escuro .mm-day:hover { background: #312e81; color: #a5b4fc; }
  body.tema-escuro .mm-day:active { background: var(--primary); color: #fff; }
  body.tema-escuro .mm-day.selected { background: var(--primary); color: #fff; }
  .mm-dots { display: flex; gap: 2px; justify-content: center; margin-top: 2px; }
  .mm-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .dot-birthday { background: #ec4899; }
  .dot-event    { background: var(--primary); }
  .dot-meeting  { background: var(--success); }

  /* ══ DAY DETAIL PANEL (Eventos tab) ══ */
  .day-detail-panel { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); margin-top: 12px; }
  .day-detail-title { font-weight: 800; font-size: .95rem; color: var(--primary); margin-bottom: 10px; }
  .day-detail-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .84rem; }
  .day-detail-item:last-child { border-bottom: none; }
  .ddi-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .ddi-info { flex: 1; }
  .ddi-label { font-weight: 700; }
  .ddi-sub { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }

  /* ══ EVENT LIST ══ */
  .event-list-item { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; border-left: 4px solid var(--primary); }
  .eli-title { font-weight: 700; font-size: .9rem; }
  .eli-sub   { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
  .event-del-btn { background: none; border: none; color: var(--danger); font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; margin-left: auto; }

  /* ══ LEGEND ══ */
  .cal-legend { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: .72rem; color: var(--text-muted); }
  .cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ══ LOGIN OVERLAY ══ */
  .login-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15, 12, 41, 0.82);
    backdrop-filter: blur(6px);
    z-index: 400; align-items: center; justify-content: center;
  }
  .login-overlay.open { display: flex; }
  .login-box {
    background: var(--card); border-radius: 22px;
    padding: 32px 24px; width: calc(100% - 40px); max-width: 360px;
    box-shadow: 0 20px 60px rgba(79,70,229,0.25);
    text-align: center;
  }
  .login-icon { font-size: 2.8rem; margin-bottom: 10px; }
  .login-title { font-size: 1.15rem; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
  .login-sub { font-size: .8rem; color: var(--text-muted); margin-bottom: 20px; }
  .login-input-wrap { position: relative; margin-bottom: 14px; }
  .login-input-wrap input {
    width: 100%; padding: 12px 44px 12px 14px;
    border: 2px solid var(--border); border-radius: 11px;
    font-size: 1rem; background: var(--bg); color: var(--text);
    letter-spacing: .1em;
  }
  .login-input-wrap input:focus { outline: none; border-color: var(--primary-light); background: var(--card); color: var(--text); }
  .login-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--text-muted); }
  .login-err { color: var(--danger); font-size: .8rem; margin-bottom: 10px; min-height: 18px; }
  .login-cancel { margin-top: 10px; background: none; border: none; color: var(--text-muted);
    font-size: .82rem; cursor: pointer; text-decoration: underline; }

  /* Lock badge on nav buttons that need auth */
  .nav-btn .lock-icon { font-size: .65rem; opacity: .55; margin-left: 2px; }
  /* Add button locked state */
  .btn-locked { opacity: .55; cursor: default; }

  /* ══ FILTER ══ */
  .filtro-row { display: flex; gap: 10px; align-items: flex-end; }
  .vis-opt {
    display: block; width: 100%; padding: 12px 16px; text-align: left;
    background: none; border: none; font-size: .88rem; font-weight: 600;
    color: var(--primary); cursor: pointer; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .vis-opt:last-child { border-bottom: none; }
  .vis-opt:hover { background: #eef2ff; }

  /* ══ CHART MODAL ══ */
  #modal-grafico .modal { max-height: 85vh; }

  /* ══ ATAS ══ */
  .ata-item { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; border-left: 4px solid var(--primary); cursor: pointer; transition: all .2s; }
  .ata-item:hover { background: #eef2ff; }
  .ata-title { font-weight: 700; font-size: .9rem; }
  .ata-sub { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
  .ata-del-btn { background: none; border: none; color: var(--danger); font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; margin-left: auto; }

  /* Assunto tabs */
  .assunto-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .assunto-tab { flex: 1; padding: 8px 4px; border: 1.5px solid var(--border); border-radius: 9px; font-size: .78rem; font-weight: 700; color: var(--text-muted); background: var(--bg); cursor: pointer; text-align: center; transition: all .2s; }
  .assunto-tab.active { border-color: var(--primary); background: #eef2ff; color: var(--primary); }

  /* Auxiliar checklist */
  .aux-check-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .aux-check-item:last-child { border-bottom: none; }
  .aux-check-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }

  /* ══ PHOTO FRAMING ══ */
  .photo-source-btns { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
  .photo-src-btn { flex: 1; padding: 8px 4px; border: 1.5px solid var(--primary-light); border-radius: 9px; font-size: .78rem; font-weight: 700; color: var(--primary); background: var(--bg); cursor: pointer; text-align: center; transition: all .2s; }
  .photo-src-btn:hover { background: #eef2ff; }

  .photo-frame-editor { display: none; margin: 0 auto 12px; width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); overflow: hidden; position: relative; cursor: grab; touch-action: none; }
  .photo-frame-editor.active { display: block; }
  .photo-frame-editor img { position: absolute; transform-origin: 0 0; user-select: none; pointer-events: none; }
  .frame-controls { display: none; justify-content: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .frame-controls.active { display: flex; }
  .frame-ctrl-btn { background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: .75rem; font-weight: 700; cursor: pointer; color: var(--primary); }
  .frame-ctrl-btn:hover { background: #eef2ff; }

  /* ══ VERSINHOS ══ */
  .versinho-item { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); border-left: 4px solid var(--accent); }
  .versinho-ref { font-size: .78rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }

  .vs-multi-select { width: 100%; border: 1.5px solid var(--border); border-radius: 9px; font-size: .88rem; background: var(--bg); color: var(--text); padding: 6px 4px; min-height: 90px; }
  .vs-multi-select:focus { outline: none; border-color: var(--primary-light); background: var(--card); color: var(--text); }
  .vs-cap-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; max-height: 160px; overflow-y: auto; padding: 6px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; }
  .vs-cap-btn { padding: 6px 2px; border: 1.5px solid var(--border); border-radius: 7px; font-size: .8rem; font-weight: 700; background: var(--card); color: var(--text); cursor: pointer; text-align: center; transition: all .15s; }

  .vs-ver-btn { padding: 6px 2px; border: 1.5px solid var(--border); border-radius: 7px; font-size: .8rem; font-weight: 700; background: var(--card); color: var(--text); cursor: pointer; text-align: center; transition: all .15s; }
  .vs-ver-btn.sel { background: var(--accent); color: #fff; border-color: var(--accent); }

  .vs-menu-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }

  .vs-cont-panel { display: none; }

  .vs-cont-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

  .vs-recit-list { margin-bottom: 10px; }

  /* ══ TRECHO SELECIONADO ══ */
  .vs-trecho-inline {
    margin-top: 5px;
